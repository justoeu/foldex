# Application stack: backend + web. Postgres lives in docker-compose.db.yml
# and is reached through the shared `foldex` external network. Bring it up
# with `make db-up` (or directly with `docker compose -f docker-compose.db.yml up -d`)
# before this one.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # DB_URL is derived from the POSTGRES_* vars in .env so credentials live
      # in one place only. POSTGRES_HOST decides where the backend looks:
      #   - `db` (default) → self-hosted via docker-compose.db.yml
      #   - `host.docker.internal` → any Postgres running on the host
      #   - explicit hostname → external Postgres reachable from this network
      # Override DB_URL entirely for non-derivable DSNs (TLS, schema, etc.).
      DB_URL: ${DB_URL:-postgres://${POSTGRES_USER:-foldex}:${POSTGRES_PASSWORD:-foldex}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-foldex}?sslmode=${POSTGRES_SSLMODE:-disable}}
      BACKEND_PORT: ${BACKEND_PORT:-9089}
      PREVIEW_WORKER_CONCURRENCY: ${PREVIEW_WORKER_CONCURRENCY:-4}
      PREVIEW_FETCH_TIMEOUT_SEC: ${PREVIEW_FETCH_TIMEOUT_SEC:-5}
      PREVIEW_STRICT_SSRF: ${PREVIEW_STRICT_SSRF:-}
      SHARED_SECRET: ${SHARED_SECRET:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
      MINIO_BUCKET: ${MINIO_BUCKET:-foldex-screenshots}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
    ports:
      # BACKEND_PORT is both the in-container listen port (read from env) and
      # the host-side bind port. Keep them aligned so nginx and curl agree.
      - "127.0.0.1:${BACKEND_PORT:-9089}:${BACKEND_PORT:-9089}"
    # Lets the container reach a Postgres running on the host. From inside a
    # container `localhost` would normally point at the container itself; we
    # remap it to the host gateway so users can write `POSTGRES_HOST=localhost`
    # naturally. `host.docker.internal` is also aliased for portability.
    # No-op when using the self-hosted `db` service.
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    networks:
      - foldex

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:9089}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-9088}:80"
      - "127.0.0.1:${WEB_HTTPS_PORT:-9444}:443"
    # Mount the mkcert pair from the host so the image stays generic.
    # The path is gitignored locally — `make up` after `mkcert ...` lands
    # the cert here; the entrypoint detects it and skips the ephemeral
    # placeholder. Mounted read-only so the container can't tamper with
    # the host keys.
    volumes:
      - ./web/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - foldex

networks:
  foldex:
    name: foldex
    external: true
