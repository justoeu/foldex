# Application stack: backend + web. Postgres lives in docker-compose.db.yml
# and is reached through the shared `foldex` external network. Bring it up
# with `make db-up` (or directly with `docker compose -f docker-compose.db.yml up -d`)
# before this one.

services:
  backend:
    # Pulled from Docker Hub by default — set FOLDEX_VERSION in .env to pin a
    # specific tag (e.g. `v1.2.3`, `sha-3f6cc06`). `build:` is kept so
    # `docker compose build` (or `make up-build`) still produces a local
    # image with the same name when developing from source.
    image: justoeu/foldex-backend:${FOLDEX_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # DB_URL is derived from the POSTGRES_* vars in .env so credentials live
      # in one place only. POSTGRES_HOST decides where the backend looks:
      #   - `db` (default) → self-hosted via docker-compose.db.yml
      #   - `host.docker.internal` → any Postgres running on the host
      #   - explicit hostname → external Postgres reachable from this network
      # Override DB_URL entirely for non-derivable DSNs (TLS, schema, etc.).
      DB_URL: ${DB_URL:-postgres://${POSTGRES_USER:-foldex}:${POSTGRES_PASSWORD:-foldex}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-foldex}?sslmode=${POSTGRES_SSLMODE:-disable}}
      BACKEND_PORT: ${BACKEND_PORT:-9089}
      # Inside a container, listening on the loopback (127.0.0.1) means nginx
      # in the sibling container cannot reach the backend over the `foldex`
      # network. The backend's own config default IS 127.0.0.1 for the
      # bare-host case ("single-user threat model"); inside compose we
      # override to 0.0.0.0 so the inter-container address works. The host
      # port mapping at the bottom (BIND_HOST:127.0.0.1:…) keeps the outer
      # surface loopback-only.
      BACKEND_BIND: ${BACKEND_BIND:-0.0.0.0}
      PREVIEW_WORKER_CONCURRENCY: ${PREVIEW_WORKER_CONCURRENCY:-4}
      PREVIEW_FETCH_TIMEOUT_SEC: ${PREVIEW_FETCH_TIMEOUT_SEC:-5}
      PREVIEW_STRICT_SSRF: ${PREVIEW_STRICT_SSRF:-}
      SHARED_SECRET: ${SHARED_SECRET:-}
      # CORS scope: inside compose, the SPA is served from nginx (same origin)
      # and its /api/ calls are same-origin too — CORS only matters for
      # browser cross-origin calls. Default to https://localhost so the
      # secure-defaults validator (refuses wildcard + no secret + non-loopback
      # bind) is happy in the typical local deployment. Override in .env when
      # serving the SPA from a different hostname.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
      MINIO_BUCKET: ${MINIO_BUCKET:-foldex-screenshots}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      # Change-detection worker. Opt-in per link via link.check_interval;
      # the kill-switch below stops the worker entirely (the scanner won't
      # even spin up its ticker). Defaults are safe for a single-user box
      # — bump CHANGECHECK_WORKER_CONCURRENCY when you opt in many links
      # with hourly intervals.
      CHANGECHECK_ENABLED: ${CHANGECHECK_ENABLED:-1}
      CHANGECHECK_WORKER_CONCURRENCY: ${CHANGECHECK_WORKER_CONCURRENCY:-2}
      CHANGECHECK_SCAN_INTERVAL_SEC: ${CHANGECHECK_SCAN_INTERVAL_SEC:-60}
      CHANGECHECK_FETCH_TIMEOUT_SEC: ${CHANGECHECK_FETCH_TIMEOUT_SEC:-20}
      # Web Push / VAPID. Leave the keys empty + VAPID_AUTO_GENERATE=1 for
      # the server to generate and persist them on first boot to
      # ${VAPID_STATE_PATH} (default /data/vapid.json, mounted from the
      # `foldex-data` volume below). Pin them in .env for stable behaviour
      # across container recreations — otherwise every fresh container
      # invalidates all existing browser subscriptions.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:foldex@localhost}
      VAPID_AUTO_GENERATE: ${VAPID_AUTO_GENERATE:-1}
      VAPID_STATE_PATH: ${VAPID_STATE_PATH:-/data/vapid.json}
    volumes:
      # Persists the autogenerated VAPID keypair across container restarts.
      # Skip mounting if you pin VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY in
      # .env — the volume only matters for the autogen path.
      - foldex-data:/data
    ports:
      # BACKEND_PORT is both the in-container listen port (read from env) and
      # the host-side bind port. Keep them aligned so nginx and curl agree.
      # BIND_HOST defaults to 127.0.0.1 (loopback-only — the safe default for
      # CLAUDE.md's "single-user, local network, no public exposure" threat
      # model). Override to 0.0.0.0 in .env when you want to reach the
      # backend from another device on the same LAN (a phone on the same
      # wifi, mostly). The web container's nginx proxies /api/ so the
      # backend doesn't strictly need to be LAN-exposed by itself — keeping
      # it loopback-only is fine and reduces attack surface.
      - "${BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-9089}:${BACKEND_PORT:-9089}"
    # Lets the container reach a Postgres running on the host. From inside a
    # container `localhost` would normally point at the container itself; we
    # remap it to the host gateway so users can write `POSTGRES_HOST=localhost`
    # naturally. `host.docker.internal` is also aliased for portability.
    # No-op when using the self-hosted `db` service.
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    networks:
      - foldex

  web:
    image: justoeu/foldex-web:${FOLDEX_VERSION:-latest}
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:9089}
    restart: unless-stopped
    ports:
      # `WEB_BIND_HOST` is loopback-only by default. Set it to `0.0.0.0` in
      # .env when you want to reach the SPA from a phone on the same wifi.
      # The cert needs to include your LAN IP in its SAN — see README HTTPS
      # section. WITHOUT a SAN match the browser rejects the connection
      # before nginx even decides what to serve.
      - "${WEB_BIND_HOST:-127.0.0.1}:${WEB_PORT:-9088}:8080"
      - "${WEB_BIND_HOST:-127.0.0.1}:${WEB_HTTPS_PORT:-9444}:8443"
    # Mount the mkcert pair from the host so the image stays generic.
    # The path is gitignored locally — `make up` after `mkcert ...` lands
    # the cert here; the entrypoint detects it and skips the ephemeral
    # placeholder. Mounted read-only so the container can't tamper with
    # the host keys.
    volumes:
      - ./web/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - foldex

networks:
  foldex:
    name: foldex
    external: true

volumes:
  foldex-data:
    name: foldex-data
