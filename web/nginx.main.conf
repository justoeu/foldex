# foldex/web — main nginx.conf override.
#
# The base nginx:alpine image ships `user nginx;` + `pid /run/nginx.pid;` in
# its main config. Both break when the container runs as the non-root `nginx`
# user (the Dockerfile sets `USER nginx`):
#   - `user nginx;` is meaningless when the master process is already
#     non-root, and nginx emits a startup warning that pollutes logs.
#   - `/run/nginx.pid` is a root-owned path; the nginx user can't create it.
#
# This file is COPY'd to /etc/nginx/nginx.conf, replacing the base. We keep
# everything else (mime.types include, log format, default sendfile/keepalive)
# identical to the upstream defaults so we don't drift from the base image's
# tuning.

worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
# /tmp is world-writable in the base image (mode 1777) — the nginx user
# can create the PID file here without a chown.
pid        /tmp/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    include /etc/nginx/conf.d/*.conf;
}
