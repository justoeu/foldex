<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F5F4FB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0A18" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Self-hosted bookmark manager with rich tagging, nestable folders, click tracking and visual URL previews." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS "Add to Home Screen" — these are still needed alongside the
         manifest because Safari does not yet honour every manifest field. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Foldex" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <title>Foldex</title>
    <style>
      html, body, #root { height: 100%; margin: 0; }
      body { background: #F5F4FB; }
      html.fx-dark, html.fx-dark body { background: #0B0A18; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
