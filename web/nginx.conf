# Redirect HTTP → HTTPS
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Defense-in-depth security headers. The single-user threat model doesn't
  # require these, but any planted XSS in the SPA (e.g. via a future render
  # bug) becomes far less useful when fetches and frame embeds are bounded.
  # `always` makes nginx emit them on error responses too (default would
  # skip 4xx/5xx).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
  # CSP: SPA serves only its own bundle + Vite-emitted styles. The frontend
  # talks to /api on the same origin (proxied below) and pulls images from
  # both the same origin (proxied screenshots/images) and arbitrary https
  # (favicons / og:image of saved links). data: is allowed for inline image
  # fallbacks. `unsafe-inline` for style-src is required by emotion's
  # runtime styles — script-src stays strict (no 'unsafe-inline'/'unsafe-eval').
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  # PWA manifest needs the canonical MIME so Chrome/Safari install it.
  # Use a location override instead of a server-level `types {}` block
  # because the latter REPLACES the default /etc/nginx/mime.types, which
  # would silently break every other extension (e.g. .js served as
  # application/octet-stream).
  location ~ \.webmanifest$ {
    default_type application/manifest+json;
  }

  # Service worker MUST NOT be cached by the browser — otherwise updates
  # never reach clients. The SW itself is small (~2 KB) and the assets it
  # points at are revisioned anyway.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }
  # index.html same story: it references the revisioned chunks. If the
  # browser holds an old copy it will keep pointing at chunks that no
  # longer exist on disk. Revalidate on every visit.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }

  ssl_certificate     /etc/nginx/certs/cert.pem;
  ssl_certificate_key /etc/nginx/certs/key.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  # Backup restore needs to accept large multipart uploads. The backend caps
  # at 2 GiB; we keep the proxy lid at 512 MiB so an honest mistake here
  # surfaces as a clear error instead of a silent OOM on the backend.
  client_max_body_size 512m;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Image upload — `proxy_request_buffering off` (set on /api/ below for
  # backup streams) makes nginx forward bytes as they arrive. When the
  # backend's MaxBytesReader trips on an oversized image, it drops the
  # connection mid-stream and nginx returns 502 instead of the backend's
  # clean 413. Carving the image endpoint out into its own location so
  # the request is buffered and the cap is enforced by nginx before the
  # request ever reaches the backend — the user gets a deterministic
  # 413 instead of a 502 race.
  #
  # Cap is 22 MiB (slightly above the backend's 20 MiB ceiling) so the
  # backend's typed 413 (with the JSON envelope) wins for any payload
  # between 20 and 22 MiB; only frankly oversized requests get nginx's
  # plain-text 413.
  location ~ ^/api/links/[0-9]+/image$ {
    proxy_pass http://backend:9089;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    client_max_body_size 22m;
    # default proxy_request_buffering is `on` — explicit for documentation.
    proxy_request_buffering on;
  }

  # Proxy API + redirect to backend
  location /api/ {
    proxy_pass http://backend:9089;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    # Streaming + generous timeouts for backup endpoints. Defaults (60s) cut
    # the connection mid-upload on slower networks for large zips.
    proxy_request_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
  location /go/ {
    proxy_pass http://backend:9089;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
  location /healthz {
    proxy_pass http://backend:9089;
  }
}
