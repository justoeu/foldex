<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Foldex — Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 480px; margin: 24px auto; padding: 0 16px; color: #f5f7fb; background: #0b0d12; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-top: 14px; }
    input { width: 100%; padding: 8px 10px; box-sizing: border-box;
      background: rgba(255,255,255,0.04); color: #f5f7fb;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; font-size: 14px; }
    button { background: #6366F1; color: white; border: 0; border-radius: 6px;
      padding: 8px 14px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 14px; }
    button.secondary { background: transparent; color: #94a3b8; }
    .status { margin-top: 12px; font-size: 13px; }
    .status.ok { color: #34d399; }
    .status.error { color: #f87171; }
  </style>
</head>
<body>
  <h2>Foldex extension settings</h2>
  <label for="baseUrl">Backend base URL</label>
  <input id="baseUrl" type="url" placeholder="http://localhost:9089" />
  <label for="sharedSecret">Shared secret (optional)</label>
  <input id="sharedSecret" type="text" placeholder="leave empty unless SHARED_SECRET is set" />
  <div>
    <button id="save">Save</button>
    <button id="test" class="secondary">Test connection</button>
  </div>
  <div id="status" class="status"></div>
  <script src="options.js"></script>
</body>
</html>
