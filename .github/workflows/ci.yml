name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Least-privilege default for every job; publish jobs opt back into what they need.
permissions:
  contents: read

jobs:
  # Lint every workflow under .github/workflows — syntax, shellcheck on `run:`
  # blocks, and malformed `uses:` refs — so a broken or unpinned action is
  # caught here instead of on a live run. The rhysd/actionlint image bundles
  # shellcheck; digest-pinned (`1.7.12`) per CLAUDE.md §4.
  workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: actionlint
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo \
            rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 \
            -color

  backend:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
    steps:
      # Third-party actions pinned to full SHA — major-version tags are
      # mutable and a compromised upstream could swap them silently. Comments
      # carry the original tag so Dependabot can update on a release.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: gofmt
        working-directory: backend
        run: make fmt-check
      - name: vet
        working-directory: backend
        run: go vet ./...
      - name: unit + integration tests (with coverage)
        working-directory: backend
        # Tests are the hard gate — broken tests block CI. The coverage
        # instrumentation rides along (`make coverage-run` = same `go test`
        # invocation as `test-integration` plus `-covermode/-coverpkg/
        # -coverprofile`). Running tests TWICE (once bare, once for
        # coverage) used to double the integration-suite cost — each
        # testcontainers spin-up is ~3-5s × ~50 cases.
        run: make coverage-run
      - name: coverage gate (informational; goal 85%)
        working-directory: backend
        # Reads coverage.out left behind by the previous step — does NOT
        # re-run any tests. Informational while the suite catches up
        # (see CLAUDE.md §2); job stays green when below threshold.
        run: make coverage-check
        continue-on-error: true
      - name: coverage-check shell harness
        # Locks the missing-file + threshold-pass + threshold-fail branches
        # of `make coverage-check`. Cheap (re-uses the cssvalid package
        # already exercised by the previous step) so it never inflates the
        # backend job materially.
        run: bash backend/scripts/test-coverage-check.sh
      - name: govulncheck (informational)
        # Pre-built action avoids `go run` recompiling govulncheck from
        # source on every CI run (was ~30-45s per job). Same informational
        # contract as before — finds CVEs but never blocks merge.
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-input: '1.26'
          work-dir: backend
          check-latest: true
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Match CLAUDE.md §1 — Docker, dev, and CI all share one resolver.
          bun-version: '1.3'
      - working-directory: web
        run: bun install --frozen-lockfile
      - name: type-check
        working-directory: web
        run: bun run typecheck
      - name: tests (with coverage)
        working-directory: web
        # `coverage:nogate` runs the full suite under v8 and writes
        # coverage-summary.json without enforcing the thresholds baked
        # into vitest.config.ts — that aspirational check lives in the
        # next informational step. Test failures still block CI.
        run: bun run coverage:nogate
      - name: coverage threshold (informational; goal 85% lines, 80% branches)
        working-directory: web
        # vitest emits coverage-summary.json — parse + threshold-check in
        # ~1s without re-running any tests. Same aspirational contract as
        # backend (CLAUDE.md §2): never blocks merge.
        run: |
          node -e "
            const s = require('./coverage/coverage-summary.json').total;
            const linesOK = s.lines.pct >= 85;
            const branchesOK = s.branches.pct >= 80;
            console.log('lines', s.lines.pct + '%', linesOK ? 'OK' : 'BELOW 85%');
            console.log('branches', s.branches.pct + '%', branchesOK ? 'OK' : 'BELOW 80%');
            if (!linesOK || !branchesOK) process.exit(1);
          "
        continue-on-error: true
      - name: release.sh awk regression
        # Locks the "first-match-only" invariant of update_version() in
        # scripts/release.sh. Without it, a future sed/awk swap could
        # silently rewrite nested "version": "x.y.z" fields (e.g. inside
        # a dependencies block of a lockfile-shaped file) and corrupt
        # the release commit.
        run: bash scripts/test-release-awk.sh
      - name: bun audit (informational)
        working-directory: web
        # CVE scan for npm packages. Same informational-only contract as
        # govulncheck above. `--audit-level=high` so noisy LOW/MEDIUM
        # advisories don't bury the signal.
        run: bun audit --audit-level=high
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────
  # Docker Hub publish — only runs AFTER backend + frontend gates pass.
  #
  # On `push: main`              → tags `latest` + short git SHA
  # On `push: tags v*`           → tags semver (`vX.Y.Z`, `vX.Y`, `vX`) + `latest`
  # On PRs                       → builds for validation, does NOT push
  #
  # Build topology: 2 images × 2 architectures = 4 runners in parallel.
  # Each cell builds a **single-arch** image on a **native** runner
  # (ubuntu-latest for amd64, ubuntu-24.04-arm for arm64) — no QEMU
  # emulation. Per-arch images are pushed *by digest only* (no tags yet).
  # The `publish-manifest` job below then assembles the per-arch digests
  # into a single multi-arch tag list using `docker buildx imagetools`.
  #
  # Why this beats the old layout:
  #   - arm64 ran emulated under QEMU on an amd64 runner — `bun install`,
  #     `bun run build`, and `apk upgrade` ran 5-10× slower. Native arm64
  #     runners bring it to wall-clock parity with amd64.
  #   - backend + web used to build sequentially in the same job. Now both
  #     start at the same minute on independent runners.
  # Reference: https://docs.docker.com/build/ci/github-actions/multi-platform/
  #
  # Requires repository secrets:
  #   DOCKERHUB_USERNAME — Docker Hub login
  #   DOCKERHUB_TOKEN    — Docker Hub Personal Access Token (NOT the password)
  publish:
    needs: [backend, frontend]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            context: ./backend
            repo: justoeu/foldex-backend
          - name: web
            # web/Dockerfile no longer COPYs certs into the image — the
            # entrypoint generates an ephemeral self-signed pair at
            # container start (or the operator mounts their own pair as a
            # volume). Keeps private keys OUT of the published image.
            context: ./web
            repo: justoeu/foldex-web
        platform:
          - tag: amd64
            id: linux/amd64
            runner: ubuntu-latest
          - tag: arm64
            id: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Log in to Docker Hub
        # Only logs in when we're going to push (i.e. not a PR). PR builds
        # validate the Dockerfile compiles cleanly without needing creds.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.context }}/Dockerfile
          platforms: ${{ matrix.platform.id }}
          # push-by-digest=true: upload the image to the registry without
          # any tag. The manifest job below stitches the per-arch digests
          # into the canonical tags so a half-finished build can never
          # half-overwrite `latest`.
          outputs: |
            type=image,name=${{ matrix.image.repo }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          # Scope cache by image AND arch — sharing across archs poisons
          # the cache (an amd64 layer can't satisfy an arm64 build).
          cache-from: type=gha,scope=foldex-${{ matrix.image.name }}-${{ matrix.platform.tag }}
          cache-to: type=gha,scope=foldex-${{ matrix.image.name }}-${{ matrix.platform.tag }},mode=max

      - name: Export digest
        if: github.event_name != 'pull_request'
        # Drop a sentinel file named after the digest; the manifest job
        # downloads every per-image-per-arch artifact and reads the
        # filenames to assemble the final manifest list.
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: digests-${{ matrix.image.name }}-${{ matrix.platform.tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the per-arch digests of each image into a single multi-arch
  # manifest under the canonical tags. Runs in parallel for backend + web
  # via a matrix; each cell waits on its two `publish` matrix cells.
  publish-manifest:
    needs: publish
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            repo: justoeu/foldex-backend
          - name: web
            repo: justoeu/foldex-web
    steps:
      - name: Download digests
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          # Picks up both `digests-<image>-amd64` and `digests-<image>-arm64`.
          pattern: digests-${{ matrix.image.name }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Log in to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag computation: branch/tag → `latest` and `v1.2.3` style + a short
      # SHA on every push so a deploy can pin to an exact commit if needed.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ matrix.image.repo }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create + push manifest list
        working-directory: /tmp/digests
        # The digest list comes from sentinel files dropped by the publish
        # job — one filename per arch, named after the layer digest. Filter
        # by 64 hex chars so a stray artifact (log, README, hidden file) can
        # never sneak into the manifest as a fake digest.
        run: |
          # SC2046/SC2010: the word-splitting IS the point — each `-t <tag>` and
          # each `<repo>@sha256:<digest>` must land as a separate argv entry.
          # shellcheck disable=SC2046,SC2010
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<<"$DOCKER_METADATA_OUTPUT_JSON") \
            $(ls -1 | grep -E '^[a-f0-9]{64}$' | sed 's|^|${{ matrix.image.repo }}@sha256:|')

      # `steps.meta.outputs.version` resolves to `pr-N` on PR triggers — the
      # whole job is gated by the `if: != 'pull_request'` at the top, so the
      # value is always a real tag here. Don't strip the gate without also
      # picking a different inspect target.
      - name: Inspect manifest
        run: docker buildx imagetools inspect ${{ matrix.image.repo }}:${{ steps.meta.outputs.version }}
