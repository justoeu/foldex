name: ci

# Pull-request gate ONLY. Lint, unit/integration tests, coverage, and a
# no-push Docker build validation — everything that must pass before code
# lands on main. Publishing the images lives in release.yml (push: main +
# tags v*) so a merge to main never re-runs this whole suite; release trusts
# the gate that already ran on the PR.
on:
  pull_request:

# Least-privilege default for every job.
permissions:
  contents: read

jobs:
  # Lint every workflow under .github/workflows — syntax, shellcheck on `run:`
  # blocks, and malformed `uses:` refs — so a broken or unpinned action is
  # caught here instead of on a live run. The rhysd/actionlint image bundles
  # shellcheck; digest-pinned (`1.7.12`) per CLAUDE.md §4.
  workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: actionlint
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo \
            rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 \
            -color

  backend:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
    steps:
      # Third-party actions pinned to full SHA — major-version tags are
      # mutable and a compromised upstream could swap them silently. Comments
      # carry the original tag so Dependabot can update on a release.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: gofmt
        working-directory: backend
        run: make fmt-check
      - name: vet
        working-directory: backend
        run: go vet ./...
      - name: unit + integration tests (with coverage)
        working-directory: backend
        # Tests are the hard gate — broken tests block CI. The coverage
        # instrumentation rides along (`make coverage-run` = same `go test`
        # invocation as `test-integration` plus `-covermode/-coverpkg/
        # -coverprofile`). Running tests TWICE (once bare, once for
        # coverage) used to double the integration-suite cost — each
        # testcontainers spin-up is ~3-5s × ~50 cases.
        run: make coverage-run
      - name: coverage gate (informational; goal 85%)
        working-directory: backend
        # Reads coverage.out left behind by the previous step — does NOT
        # re-run any tests. Informational while the suite catches up
        # (see CLAUDE.md §2); job stays green when below threshold.
        run: make coverage-check
        continue-on-error: true
      - name: coverage-check shell harness
        # Locks the missing-file + threshold-pass + threshold-fail branches
        # of `make coverage-check`. Cheap (re-uses the cssvalid package
        # already exercised by the previous step) so it never inflates the
        # backend job materially.
        run: bash backend/scripts/test-coverage-check.sh
      - name: govulncheck (informational)
        # Pre-built action avoids `go run` recompiling govulncheck from
        # source on every CI run (was ~30-45s per job). Same informational
        # contract as before — finds CVEs but never blocks merge.
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-input: '1.26'
          work-dir: backend
          check-latest: true
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          # Match CLAUDE.md §1 — Docker, dev, and CI all share one resolver.
          bun-version: '1.3'
      - working-directory: web
        run: bun install --frozen-lockfile
      - name: type-check
        working-directory: web
        run: bun run typecheck
      - name: tests (with coverage)
        working-directory: web
        # `coverage:nogate` runs the full suite under v8 and writes
        # coverage-summary.json without enforcing the thresholds baked
        # into vitest.config.ts — that aspirational check lives in the
        # next informational step. Test failures still block CI.
        run: bun run coverage:nogate
      - name: coverage threshold (informational; goal 85% lines, 80% branches)
        working-directory: web
        # vitest emits coverage-summary.json — parse + threshold-check in
        # ~1s without re-running any tests. Same aspirational contract as
        # backend (CLAUDE.md §2): never blocks merge.
        run: |
          node -e "
            const s = require('./coverage/coverage-summary.json').total;
            const linesOK = s.lines.pct >= 85;
            const branchesOK = s.branches.pct >= 80;
            console.log('lines', s.lines.pct + '%', linesOK ? 'OK' : 'BELOW 85%');
            console.log('branches', s.branches.pct + '%', branchesOK ? 'OK' : 'BELOW 80%');
            if (!linesOK || !branchesOK) process.exit(1);
          "
        continue-on-error: true
      - name: release.sh awk regression
        # Locks the "first-match-only" invariant of update_version() in
        # scripts/release.sh. Without it, a future sed/awk swap could
        # silently rewrite nested "version": "x.y.z" fields (e.g. inside
        # a dependencies block of a lockfile-shaped file) and corrupt
        # the release commit.
        run: bash scripts/test-release-awk.sh
      - name: bun audit (informational)
        working-directory: web
        # CVE scan for npm packages. Same informational-only contract as
        # govulncheck above. `--audit-level=high` so noisy LOW/MEDIUM
        # advisories don't bury the signal.
        run: bun audit --audit-level=high
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────
  # Docker build validation — PR-only, NEVER pushes. Confirms both images
  # still build cleanly across both architectures before the change can land
  # on main. The actual push lives in release.yml; gating it here means a
  # broken Dockerfile fails the PR instead of failing the release.
  #
  # Build topology mirrors release.yml: 2 images × 2 architectures = 4
  # runners in parallel, each building a single-arch image on a native
  # runner (no QEMU emulation).
  build-validation:
    needs: [backend, frontend]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          # No `repo:` here — this job never pushes, so the image name is
          # unused. release.yml's publish matrix keeps it. Mirror that matrix
          # when editing platforms/contexts so the gate and the release build
          # the same images.
          - name: backend
            context: ./backend
          - name: web
            # web/Dockerfile no longer COPYs certs into the image — the
            # entrypoint generates an ephemeral self-signed pair at
            # container start (or the operator mounts their own pair as a
            # volume). Keeps private keys OUT of the published image.
            context: ./web
        platform:
          - tag: amd64
            id: linux/amd64
            runner: ubuntu-latest
          - tag: arm64
            id: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.context }}/Dockerfile
          platforms: ${{ matrix.platform.id }}
          push: false
          # Same scope key as release.yml, but note GitHub Actions cache is
          # branch-scoped: a PR-branch cache is NOT readable from the default
          # branch, so this mainly speeds up RE-RUNS of the same PR — it does
          # not warm the release build on main. Scope by image+arch so an amd64
          # layer never satisfies an arm64 build.
          cache-from: type=gha,scope=foldex-${{ matrix.image.name }}-${{ matrix.platform.tag }}
          cache-to: type=gha,scope=foldex-${{ matrix.image.name }}-${{ matrix.platform.tag }},mode=max
