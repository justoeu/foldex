name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: vet
        working-directory: backend
        run: go vet ./...
      - name: unit + integration tests
        working-directory: backend
        # Tests are the real contract — keep them as a hard gate so a broken
        # test blocks CI even though the coverage gate below is informational.
        run: make test-integration
      - name: coverage gate (informational; goal 85%)
        working-directory: backend
        # Coverage is aspirational while the suite catches up; failing here
        # leaves the step red but the job green so CI doesn't block until
        # we close the gap (see CLAUDE.md §2).
        run: make coverage
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Match CLAUDE.md §1 — Docker, dev, and CI all share one resolver.
          bun-version: '1.3'
      - working-directory: web
        run: bun install --frozen-lockfile
      - name: type-check
        working-directory: web
        run: bun run typecheck
      - name: tests
        working-directory: web
        # Tests are a hard gate — coverage below is the informational one.
        run: bun run test
      - name: coverage gate (informational; goal 85% lines, 80% branches)
        working-directory: web
        # Same rationale as the backend coverage step: aspirational target,
        # not a CI blocker while the suite is being filled out.
        run: bun run coverage
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────
  # Docker Hub publish — only runs AFTER backend + frontend gates pass.
  #
  # On `push: main`              → tags `latest` + short git SHA
  # On `push: tags v*`           → tags semver (`vX.Y.Z`, `vX.Y`, `vX`) + `latest`
  # On PRs                       → builds for validation, does NOT push
  #
  # Multi-arch (linux/amd64 + linux/arm64) so Mac M-series can pull native
  # images. QEMU handles arm64 on x86 runners; build is ~2× slower than amd64
  # alone but still under 5min with the layer cache.
  #
  # Requires repository secrets:
  #   DOCKERHUB_USERNAME — Docker Hub login
  #   DOCKERHUB_TOKEN    — Docker Hub Personal Access Token (NOT the password)
  publish:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only logs in when we're going to push (i.e. not a PR). PR builds
        # validate the Dockerfile compiles cleanly without needing credentials.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag computation: branch/tag → `latest` and `v1.2.3` style + a short
      # SHA on every push so a deploy can pin to an exact commit if needed.
      - name: Extract metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: justoeu/foldex-backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push foldex-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=foldex-backend
          cache-to: type=gha,scope=foldex-backend,mode=max

      - name: Extract metadata (web)
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: justoeu/foldex-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # web/Dockerfile is multi-stage (bun → nginx) and does COPY certs/...
      # to bake the TLS pair into the image. web/certs/ is gitignored
      # because mkcert pairs are per-machine, so we generate a throwaway
      # self-signed pair here just to satisfy the COPY. Users who pull the
      # published image should mount their own mkcert volume to override —
      # the placeholder is intentionally low-trust and labelled as such.
      - name: Generate placeholder TLS pair for image build
        run: |
          mkdir -p web/certs
          openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
            -keyout web/certs/key.pem \
            -out web/certs/cert.pem \
            -subj "/CN=foldex-placeholder" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"

      - name: Build & push foldex-web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          cache-from: type=gha,scope=foldex-web
          cache-to: type=gha,scope=foldex-web,mode=max
