name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: vet
        working-directory: backend
        run: go vet ./...
      - name: unit + integration tests
        working-directory: backend
        # Tests are the real contract — keep them as a hard gate so a broken
        # test blocks CI even though the coverage gate below is informational.
        run: make test-integration
      - name: coverage gate (informational; goal 85%)
        working-directory: backend
        # Coverage is aspirational while the suite catches up; failing here
        # leaves the step red but the job green so CI doesn't block until
        # we close the gap (see CLAUDE.md §2).
        run: make coverage
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Match CLAUDE.md §1 — Docker, dev, and CI all share one resolver.
          bun-version: '1.3'
      - working-directory: web
        run: bun install --frozen-lockfile
      - name: type-check
        working-directory: web
        run: bun run typecheck
      - name: tests
        working-directory: web
        # Tests are a hard gate — coverage below is the informational one.
        run: bun run test
      - name: coverage gate (informational; goal 85% lines, 80% branches)
        working-directory: web
        # Same rationale as the backend coverage step: aspirational target,
        # not a CI blocker while the suite is being filled out.
        run: bun run coverage
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────
  # Docker Hub publish — only runs AFTER backend + frontend gates pass.
  #
  # On `push: main`              → tags `latest` + short git SHA
  # On `push: tags v*`           → tags semver (`vX.Y.Z`, `vX.Y`, `vX`) + `latest`
  # On PRs                       → builds for validation, does NOT push
  #
  # Build topology: 2 images × 2 architectures = 4 runners in parallel.
  # Each cell builds a **single-arch** image on a **native** runner
  # (ubuntu-latest for amd64, ubuntu-24.04-arm for arm64) — no QEMU
  # emulation. Per-arch images are pushed *by digest only* (no tags yet).
  # The `publish-manifest` job below then assembles the per-arch digests
  # into a single multi-arch tag list using `docker buildx imagetools`.
  #
  # Why this beats the old layout:
  #   - arm64 ran emulated under QEMU on an amd64 runner — `bun install`,
  #     `bun run build`, and `apk upgrade` ran 5-10× slower. Native arm64
  #     runners bring it to wall-clock parity with amd64.
  #   - backend + web used to build sequentially in the same job. Now both
  #     start at the same minute on independent runners.
  # Reference: https://docs.docker.com/build/ci/github-actions/multi-platform/
  #
  # Requires repository secrets:
  #   DOCKERHUB_USERNAME — Docker Hub login
  #   DOCKERHUB_TOKEN    — Docker Hub Personal Access Token (NOT the password)
  publish:
    needs: [backend, frontend]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            context: ./backend
            repo: justoeu/foldex-backend
          - name: web
            # web/Dockerfile no longer COPYs certs into the image — the
            # entrypoint generates an ephemeral self-signed pair at
            # container start (or the operator mounts their own pair as a
            # volume). Keeps private keys OUT of the published image.
            context: ./web
            repo: justoeu/foldex-web
        platform:
          - tag: amd64
            id: linux/amd64
            runner: ubuntu-latest
          - tag: arm64
            id: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only logs in when we're going to push (i.e. not a PR). PR builds
        # validate the Dockerfile compiles cleanly without needing creds.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.context }}/Dockerfile
          platforms: ${{ matrix.platform.id }}
          # push-by-digest=true: upload the image to the registry without
          # any tag. The manifest job below stitches the per-arch digests
          # into the canonical tags so a half-finished build can never
          # half-overwrite `latest`.
          outputs: |
            type=image,name=${{ matrix.image.repo }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          # Scope cache by image AND arch — sharing across archs poisons
          # the cache (an amd64 layer can't satisfy an arm64 build).
          cache-from: type=gha,scope=foldex-${{ matrix.image.name }}-${{ matrix.platform.tag }}
          cache-to: type=gha,scope=foldex-${{ matrix.image.name }}-${{ matrix.platform.tag }},mode=max

      - name: Export digest
        if: github.event_name != 'pull_request'
        # Drop a sentinel file named after the digest; the manifest job
        # downloads every per-image-per-arch artifact and reads the
        # filenames to assemble the final manifest list.
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image.name }}-${{ matrix.platform.tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the per-arch digests of each image into a single multi-arch
  # manifest under the canonical tags. Runs in parallel for backend + web
  # via a matrix; each cell waits on its two `publish` matrix cells.
  publish-manifest:
    needs: publish
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            repo: justoeu/foldex-backend
          - name: web
            repo: justoeu/foldex-web
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          # Picks up both `digests-<image>-amd64` and `digests-<image>-arm64`.
          pattern: digests-${{ matrix.image.name }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag computation: branch/tag → `latest` and `v1.2.3` style + a short
      # SHA on every push so a deploy can pin to an exact commit if needed.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image.repo }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create + push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<<"$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ matrix.image.repo }}@sha256:%s ' *)

      - name: Inspect manifest
        run: docker buildx imagetools inspect ${{ matrix.image.repo }}:${{ steps.meta.outputs.version }}
