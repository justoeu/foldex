name: codeql

# CodeQL — GitHub-native SAST (deep dataflow). Covers the Go backend and the
# React/TS frontend. Results land in the repo Security ▸ Code scanning tab.
#
# Informational while the rule set is tuned (mirrors CLAUDE.md §2's "govulncheck
# + bun audit run as informational steps" posture): findings surface but do not
# gate merges yet. The analyze step keeps its own non-blocking contract because
# `security-events: write` only *uploads* SARIF — it never fails the job on an
# alert.
on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**'] # docs-only commits don't need a code scan
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**']
  schedule:
    # Weekly full sweep (Monday 06:17 UTC) so a CVE in a transitive path that
    # nobody touched still gets re-scanned against fresh CodeQL queries.
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
      actions: read          # read workflow run metadata for the analysis
    strategy:
      fail-fast: false
      matrix:
        include:
          # Manual build (not autobuild): go.mod lives in backend/, so we drive
          # the compile ourselves between init and analyze — autobuild's
          # repo-root probe would miss the module.
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The Go module lives in backend/, not the repo root, so point setup-go's
      # cache key at backend/go.sum (Go 1.26.x per CLAUDE.md §1).
      - if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended adds the higher-recall query suite on top of the
          # default — more findings (incl. SSRF / path-traversal patterns the
          # threat model in CLAUDE.md §4 cares about) at the cost of some noise.
          queries: security-extended

      # Manual build under CodeQL tracing — must sit between init and analyze.
      - if: matrix.language == 'go'
        name: Build (Go)
        working-directory: backend
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: /language:${{ matrix.language }}
