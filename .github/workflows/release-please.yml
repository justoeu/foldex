name: release-please

# Auto-bump versions and publish releases from conventional commits.
# Pure config-driven workflow (no run: steps, no untrusted input
# interpolation). release-please reads commit history via the GitHub API
# and writes back via the same.
#
# How it works:
#   1. Every push to main runs release-please.
#   2. It scans commits since the last release tag and either OPENS or
#      UPDATES a long-lived "release PR" that bumps the version + writes
#      CHANGELOG.md entries grouped by conventional type.
#   3. When you merge that PR, release-please creates a git tag vX.Y.Z.
#   4. The existing ci.yml is triggered by tags: ['v*'] and publishes
#      Docker images tagged :vX.Y.Z, :vX.Y, :vX, and :latest.
#
# Bump rules: pre-1.0 (0.x.y), feat: -> minor, fix: -> patch, breaking
# also bumps minor (configured in release-please-config.json). After 1.0,
# breaking starts bumping major as usual.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
