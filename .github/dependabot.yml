# Dependabot — automated dependency PRs across every ecosystem in the repo.
#
# Pairs with CLAUDE.md §4 "All CI actions are SHA-pinned": each `uses:` line
# carries a 40-char SHA + `# vX.Y.Z` comment, and Dependabot reads that comment
# to know which release the pinned SHA maps to — so it can bump the SHA on a
# new release without us hand-resolving commits.
#
# Updates are grouped (minor + patch together) to keep the PR count sane on a
# single-maintainer repo; majors stay separate so breaking changes get their
# own review (CLAUDE.md §1 "evaluate breaking changes if major").
version: 2
updates:
  # ── GitHub Actions (all workflow `uses:` lines live under .github/) ──
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    groups:
      actions-minor:
        update-types: [minor, patch]

  # ── Backend Go modules ──
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    labels: [dependencies, backend]
    groups:
      gomod-minor:
        update-types: [minor, patch]

  # ── Frontend deps are NOT managed here ──
  # The web app uses bun (CLAUDE.md §1) and the lockfile is `web/bun.lock`.
  # Dependabot's `npm` ecosystem only rewrites `package.json` — it cannot
  # regenerate `bun.lock`, so every PR it opened left the frozen lockfile out
  # of sync and CI's `bun install --frozen-lockfile` failed. Update frontend
  # deps manually with `cd web && bun update` (the §1 flow) instead.

  # ── Container base images (FROM lines) ──
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
    labels: [dependencies, docker]
