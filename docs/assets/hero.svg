<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-label="foldex — self-hosted bookmark manager">
  <defs>
    <!-- Indigo→violet brand gradient (matches --fx-accent in the app). -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <!-- Background aurora — same look as the SPA's dark gradient. -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F4FB"/>
      <stop offset="100%" stop-color="#E4DFFA"/>
    </linearGradient>
    <radialGradient id="aurora1" cx="80%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="15%" cy="90%" r="40%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <!-- Cards use a glassy surface with a faint inner highlight. -->
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="folderTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="folderTile2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="folderTile3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B85FF"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="ctaWarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <!-- Reusable preview placeholders for link cards. -->
    <linearGradient id="prev1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="prev2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="prev3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="prev4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="560" fill="url(#bg)"/>
  <rect width="1200" height="560" fill="url(#aurora1)"/>
  <rect width="1200" height="560" fill="url(#aurora2)"/>

  <!-- ─── Topbar (mock of the real UI) ──────────────────────────── -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="1120" height="56" rx="14" fill="url(#card)" stroke="#E5E7EB"/>

    <!-- fx monogram -->
    <rect x="14" y="12" width="32" height="32" rx="9" fill="url(#brand)"/>
    <text x="30" y="34" font-family="-apple-system, system-ui, sans-serif" font-weight="800" font-size="15" fill="#FFFFFF" text-anchor="middle">fx</text>
    <text x="56" y="26" font-family="-apple-system, system-ui, sans-serif" font-weight="700" font-size="15" fill="#1F2937">foldex</text>
    <text x="56" y="40" font-family="ui-monospace, SFMono-Regular, monospace" font-size="8" fill="#9CA3AF" letter-spacing="0.18em">PERSONAL · SELF-HOSTED</text>

    <!-- quicknav icons -->
    <g transform="translate(155, 14)">
      <rect width="106" height="28" rx="8" fill="#F3F4F6"/>
      <rect x="3" y="3" width="22" height="22" rx="6" fill="#FFFFFF"/>
      <circle cx="14" cy="14" r="3.5" fill="none" stroke="#6366F1" stroke-width="2"/>
      <rect x="29" y="3" width="22" height="22" rx="6" fill="none"/>
      <path d="M37 19 V11 L41 15 L45 11 L45 19" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="55" y="3" width="22" height="22" rx="6" fill="none"/>
      <path d="M61 11 L73 11 M61 14 L73 14 M61 17 L73 17 M61 20 L67 20" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- search -->
    <rect x="290" y="14" width="380" height="28" rx="8" fill="#F9FAFB" stroke="#E5E7EB"/>
    <circle cx="305" cy="28" r="4" fill="none" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="308" y1="31" x2="312" y2="35" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round"/>
    <text x="320" y="33" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#9CA3AF">Busque por título, URL, tag…</text>
    <rect x="640" y="18" width="22" height="20" rx="5" fill="#E5E7EB"/>
    <text x="651" y="32" font-family="ui-monospace, monospace" font-size="9" fill="#6B7280" text-anchor="middle">⌥K</text>

    <!-- Nova pasta (warm CTA) -->
    <rect x="844" y="14" width="118" height="28" rx="9" fill="url(#ctaWarm)"/>
    <text x="876" y="32" font-family="-apple-system, system-ui, sans-serif" font-weight="700" font-size="12" fill="#FFFFFF">Nova pasta</text>
    <rect x="938" y="20" width="18" height="16" rx="4" fill="rgba(255,255,255,0.25)"/>
    <text x="947" y="31" font-family="ui-monospace, monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">⌥F</text>

    <!-- Novo link (brand CTA) -->
    <rect x="972" y="14" width="118" height="28" rx="9" fill="url(#cta)"/>
    <text x="1008" y="32" font-family="-apple-system, system-ui, sans-serif" font-weight="700" font-size="12" fill="#FFFFFF">+ Novo link</text>
    <rect x="1066" y="20" width="18" height="16" rx="4" fill="rgba(255,255,255,0.25)"/>
    <text x="1075" y="31" font-family="ui-monospace, monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">⌥N</text>
  </g>

  <!-- ─── Sidebar ──────────────────────────────────────────────── -->
  <g transform="translate(40, 116)">
    <rect x="0" y="0" width="220" height="404" rx="18" fill="url(#card)" stroke="#E5E7EB"/>
    <text x="20" y="32" font-family="-apple-system, system-ui, sans-serif" font-weight="700" font-size="13" fill="#1F2937">🏷  Tags</text>

    <!-- Todos os links (active) -->
    <rect x="14" y="46" width="192" height="34" rx="10" fill="#EEF0FF"/>
    <rect x="22" y="56" width="18" height="14" rx="4" fill="url(#brand)"/>
    <text x="50" y="68" font-family="-apple-system, system-ui, sans-serif" font-weight="700" font-size="12" fill="#1F2937">Todos os links</text>
    <text x="196" y="68" font-family="ui-monospace, monospace" font-size="11" fill="#6366F1" text-anchor="end">54</text>

    <!-- Frequentes -->
    <text x="20" y="104" font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.12em" fill="#9CA3AF">▾ FREQUENTES</text>
    <g font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#374151">
      <circle cx="26" cy="124" r="4" fill="#F59E0B"/>
      <text x="38" y="128">Arquitetura</text>
      <text x="196" y="128" font-family="ui-monospace, monospace" font-size="10" fill="#9CA3AF" text-anchor="end">12</text>

      <circle cx="26" cy="146" r="4" fill="#0EA5E9"/>
      <text x="38" y="150">notebookLLM</text>
      <text x="196" y="150" font-family="ui-monospace, monospace" font-size="10" fill="#9CA3AF" text-anchor="end">12</text>

      <circle cx="26" cy="168" r="4" fill="#8B5CF6"/>
      <text x="38" y="172">ia</text>
      <text x="196" y="172" font-family="ui-monospace, monospace" font-size="10" fill="#9CA3AF" text-anchor="end">11</text>

      <circle cx="26" cy="190" r="4" fill="#10B981"/>
      <text x="38" y="194">RCFs</text>
      <text x="196" y="194" font-family="ui-monospace, monospace" font-size="10" fill="#9CA3AF" text-anchor="end">9</text>

      <circle cx="26" cy="212" r="4" fill="#EC4899"/>
      <text x="38" y="216">claude</text>
      <text x="196" y="216" font-family="ui-monospace, monospace" font-size="10" fill="#9CA3AF" text-anchor="end">7</text>
    </g>

    <!-- Outras (collapsed) -->
    <text x="20" y="242" font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.12em" fill="#9CA3AF">▸ OUTRAS</text>

    <!-- Actions row -->
    <rect x="14" y="318" width="92" height="32" rx="9" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="60" y="338" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">+ Nova</text>
    <rect x="114" y="318" width="92" height="32" rx="9" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="160" y="338" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#6B7280" text-anchor="middle">✎ Gerenciar</text>

    <!-- Version footer -->
    <line x1="14" y1="368" x2="206" y2="368" stroke="#E5E7EB" stroke-dasharray="2 3"/>
    <text x="110" y="386" font-family="ui-monospace, monospace" font-size="9" fill="#9CA3AF" text-anchor="middle">foldex v1.0.3 · 14/05/2026</text>
  </g>

  <!-- ─── Main: header + grid ──────────────────────────────────── -->
  <g transform="translate(280, 116)">
    <text x="0" y="20" font-family="ui-monospace, monospace" font-size="11" letter-spacing="0.15em" fill="#A855F7">📡 EM ÓRBITA</text>
    <text x="0" y="56" font-family="-apple-system, system-ui, sans-serif" font-weight="800" font-size="32" fill="#0F172A" letter-spacing="-1px">Sua base de links</text>

    <!-- KPI strip -->
    <g transform="translate(640, 8)">
      <rect width="80" height="48" rx="12" fill="url(#card)" stroke="#E5E7EB"/>
      <text x="40" y="22" font-family="ui-monospace, monospace" font-size="8" letter-spacing="0.12em" fill="#9CA3AF" text-anchor="middle">CLIQUES 30D</text>
      <text x="40" y="40" font-family="-apple-system, system-ui, sans-serif" font-weight="800" font-size="18" fill="#1F2937" text-anchor="middle">412</text>

      <rect x="86" width="80" height="48" rx="12" fill="url(#card)" stroke="#E5E7EB"/>
      <text x="126" y="22" font-family="ui-monospace, monospace" font-size="8" letter-spacing="0.12em" fill="#9CA3AF" text-anchor="middle">LINKS</text>
      <text x="126" y="40" font-family="-apple-system, system-ui, sans-serif" font-weight="800" font-size="18" fill="#1F2937" text-anchor="middle">54</text>

      <rect x="172" width="80" height="48" rx="12" fill="url(#card)" stroke="#E5E7EB"/>
      <text x="212" y="22" font-family="ui-monospace, monospace" font-size="8" letter-spacing="0.12em" fill="#9CA3AF" text-anchor="middle">ARQUIVOS</text>
      <text x="212" y="40" font-family="-apple-system, system-ui, sans-serif" font-weight="800" font-size="18" fill="#1F2937" text-anchor="middle">29</text>
    </g>

    <!-- Folder card 1 -->
    <g transform="translate(0, 80)">
      <rect width="200" height="220" rx="16" fill="url(#card)" stroke="#E5E7EB"/>
      <!-- 2x2 tiles -->
      <rect x="14" y="14" width="78" height="72" rx="10" fill="url(#folderTile)"/>
      <rect x="106" y="14" width="78" height="72" rx="10" fill="url(#prev1)"/>
      <rect x="14" y="92" width="78" height="72" rx="10" fill="url(#prev3)"/>
      <rect x="106" y="92" width="78" height="72" rx="10" fill="#F3F4F6" stroke="#E5E7EB" stroke-dasharray="3 4"/>
      <text x="145" y="135" font-family="ui-monospace, monospace" font-size="14" fill="#9CA3AF" text-anchor="middle">+8</text>
      <!-- footer -->
      <text x="14" y="190" font-family="-apple-system, system-ui, sans-serif" font-weight="700" font-size="15" fill="#1F2937">📁 Trabalho</text>
      <text x="14" y="207" font-family="ui-monospace, monospace" font-size="10" fill="#9CA3AF">12 links · 3 pastas</text>
    </g>

    <!-- Folder card 2 (nested) -->
    <g transform="translate(216, 80)">
      <rect width="200" height="220" rx="16" fill="url(#card)" stroke="#E5E7EB"/>
      <rect x="14" y="14" width="78" height="72" rx="10" fill="url(#folderTile2)"/>
      <rect x="106" y="14" width="78" height="72" rx="10" fill="url(#prev2)"/>
      <rect x="14" y="92" width="78" height="72" rx="10" fill="url(#folderTile3)"/>
      <rect x="106" y="92" width="78" height="72" rx="10" fill="url(#prev4)"/>
      <text x="14" y="190" font-family="-apple-system, system-ui, sans-serif" font-weight="700" font-size="15" fill="#1F2937">📁 ia + claude</text>
      <text x="14" y="207" font-family="ui-monospace, monospace" font-size="10" fill="#9CA3AF">23 links</text>
    </g>

    <!-- Link card 1 -->
    <g transform="translate(432, 80)">
      <rect width="200" height="220" rx="16" fill="url(#card)" stroke="#E5E7EB"/>
      <rect x="0" y="0" width="200" height="150" rx="16" fill="url(#prev2)"/>
      <!-- pin badge -->
      <circle cx="180" cy="20" r="11" fill="url(#brand)"/>
      <path d="M180 25 V20 M177 16 H183" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round"/>
      <!-- title row -->
      <text x="14" y="172" font-family="-apple-system, system-ui, sans-serif" font-weight="700" font-size="13" fill="#1F2937">grid.adminml.com</text>
      <!-- tags -->
      <rect x="14" y="184" width="58" height="18" rx="5" fill="#EEF0FF"/>
      <circle cx="22" cy="193" r="3" fill="#0EA5E9"/>
      <text x="28" y="197" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#475569">notebookLLM</text>
      <!-- footer line -->
      <text x="14" y="210" font-family="ui-monospace, monospace" font-size="9" fill="#9CA3AF">9 cliques · 14/05</text>
    </g>

    <!-- Link card 2 -->
    <g transform="translate(648, 80)">
      <rect width="200" height="220" rx="16" fill="url(#card)" stroke="#E5E7EB"/>
      <rect x="0" y="0" width="200" height="150" rx="16" fill="url(#prev3)"/>
      <text x="14" y="172" font-family="-apple-system, system-ui, sans-serif" font-weight="700" font-size="13" fill="#1F2937">anthropic.com/claude</text>
      <rect x="14" y="184" width="40" height="18" rx="5" fill="#FCE7F3"/>
      <circle cx="22" cy="193" r="3" fill="#EC4899"/>
      <text x="28" y="197" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#9D174D">claude</text>
      <text x="14" y="210" font-family="ui-monospace, monospace" font-size="9" fill="#9CA3AF">6 cliques · 13/05</text>
    </g>
  </g>

  <!-- Pinned-badge legend hint (subtle, top-right of canvas) -->
  <g transform="translate(1050, 504)" font-family="ui-monospace, monospace" font-size="10" fill="#9CA3AF">
    <text text-anchor="end">drag · pin · tag · stats</text>
    <text x="0" y="14" text-anchor="end">⌥K · ⌥N · ⌥F · /go/:id</text>
  </g>
</svg>
